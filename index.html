<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; line-height: 1.6; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        nav { 
            background-color: #f8f9fa; 
            padding: 10px 20px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            position: sticky;
            top: 0;
            z-index: 5;
            flex-shrink: 0;
        }
        nav a { margin-right: 15px; text-decoration: none; color: #0366d6; font-weight: bold; }
        .container { display: flex; flex-grow: 1; overflow: hidden; }
        #file-list { width: 350px; border-right: 1px solid #ccc; padding: 0 20px 20px; overflow-y: auto; box-sizing: border-box; flex-shrink: 0; }
        #file-content {
            flex-grow: 1;
            min-width: 0;
            min-height: 0;
            padding: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .loaded-filter-panel {
            flex-shrink: 0;
            border: 1px solid #e4e9f2;
            border-radius: 12px;
            background: rgba(248, 250, 252, 0.92);
            padding: 12px;
            margin-bottom: 14px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.05);
        }
        .loaded-filter-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            color: #1f2937;
            font-size: 0.92em;
            font-weight: 800;
        }
        .loaded-filter-head button,
        .loaded-filter-chip {
            border: 1px solid #d8e0ec;
            border-radius: 999px;
            background: #fff;
            color: #42526b;
            cursor: pointer;
            font: inherit;
        }
        .loaded-filter-head button {
            padding: 5px 10px;
            font-size: 0.82em;
            font-weight: 700;
        }
        .loaded-filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 82px;
            overflow: auto;
        }
        .loaded-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 30px;
            padding: 5px 10px;
            font-size: 0.84em;
            white-space: nowrap;
        }
        .loaded-filter-chip:hover,
        .loaded-filter-chip[aria-pressed="true"],
        .loaded-filter-head button:hover {
            border-color: #0b63d1;
            background: #eef4ff;
            color: #0b63d1;
        }
        .loaded-filter-count {
            color: #7a8699;
            font-size: 0.88em;
            font-weight: 700;
        }
        .loaded-filter-chip[aria-pressed="true"] .loaded-filter-count {
            color: inherit;
        }
        h1, h2 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        ul { list-style-type: none; padding-left: 0; }
        li {
            margin-bottom: 10px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 10px;
            transition: background-color 0.15s ease, transform 0.15s ease;
        }
        li:hover {
            background-color: #f1f5ff;
        }
        li.selected-note:hover {
            background-color: #d2f1f4;
        }
        li.selected-note {
            background-color: #e0f7fa;
            border-radius: 10px;
            padding: 6px 10px;
            position: relative;
        }
        li.selected-note::before {
            content: '';
            position: absolute;
            left: -6px;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 4px;
            background-color: #00a6c7;
        }
        a { text-decoration: none; color: #0366d6; }
        a:hover { text-decoration: underline; }
        img { max-width: 100%; height: auto; }
        #searchInput,
        #mainDirectorySearchInput {
            width: 100%;
            padding: 9px 10px;
            box-sizing: border-box;
            border: 1px solid #d8e0ec;
            border-radius: 10px;
            font: inherit;
        }
        .list-header {
            position: sticky;
            top: 0;
            z-index: 2;
            background-color: #fff;
            padding: 20px 0 12px;
        }
        .list-header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .list-header h1 {
            margin-top: 0;
            margin-bottom: 12px;
        }
        .mobile-panel-toggle {
            display: none;
            border: 1px solid #d8e0ec;
            border-radius: 999px;
            background: #fff;
            color: #0b63d1;
            cursor: pointer;
            font: inherit;
            font-size: 0.86em;
            font-weight: 800;
            min-height: 36px;
            padding: 6px 12px;
            white-space: nowrap;
        }
        .mobile-panel-toggle:focus-visible {
            outline: 3px solid rgba(11, 99, 209, 0.28);
            outline-offset: 2px;
        }
        .left-menu-tabs {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            margin-bottom: 12px;
            padding: 4px;
            border: 1px solid #e0e7f1;
            border-radius: 12px;
            background: #f4f7fb;
        }
        .left-menu-tab {
            border: 0;
            border-radius: 9px;
            background: transparent;
            color: #5c6b82;
            cursor: pointer;
            font: inherit;
            font-size: 0.92em;
            font-weight: 800;
            padding: 8px 10px;
        }
        .left-menu-tab:hover,
        .left-menu-tab.is-active {
            background: #fff;
            color: #0b63d1;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
        }
        .left-tab-panel {
            margin-bottom: 10px;
        }
        .left-hidden {
            display: none !important;
        }
        .left-result-list {
            margin: 0;
        }
        .note-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }
        .note-list-icon {
            width: 25px;
            height: 20px;
            flex: 0 0 auto;
            color: #4db2df;
        }
        .note-list-icon svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .note-list-text {
            min-width: 0;
            overflow-wrap: anywhere;
            line-height: 1.45;
        }
        #mainDirectories li.selected-note,
        #mainDirectories li.selected-note:hover {
            background-color: #0b63d1;
            color: #fff;
        }
        #mainDirectories li.selected-note::before {
            display: none;
        }
        #mainDirectories li.selected-note .note-list-text {
            color: inherit;
        }
        .search-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        .search-option { font-size: 0.9em; color: #555; display: inline-flex; align-items: center; gap: 4px; }
        .search-option input { margin: 0; }
        #attachment-filter-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .filter-option {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-start;
        }
        .extension-options {
            display: none;
            flex-wrap: wrap;
            gap: 6px;
            padding-left: 2px;
        }
        .extension-option {
            font-size: 0.8em;
            color: #555;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        #document-section {
            margin-top: 24px;
        }
        #document-section h3 {
            margin: 0 0 12px;
            font-size: 1.05em;
        }
        #document-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .document-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 0.95em;
        }
        .document-view-link {
            font-weight: 600;
        }
        .document-view-link.active {
            color: #003d99;
        }
        .document-download-link {
            font-size: 0.85em;
            color: #666;
            display: inline-block;
        }
        #document-viewer {
            margin-top: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            min-height: 320px;
            background: #fafafa;
            position: relative;
            overflow: hidden;
        }
        #document-viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        #document-viewer-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 0.95em;
            text-align: center;
            padding: 24px;
        }
        #download-links p {
            margin: 10px 0;
        }
        #download-links a {
            text-decoration: none;
            color: #0366d6;
        }
        #download-links a:hover {
            text-decoration: underline;
        }
        .file-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background-color: #e6ecfa;
            color: #1c3a71;
            font-size: 0.8em;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .file-badge[data-type="video"] {
            background-color: #ffe8ea;
            color: #831f2f;
        }
        .file-badge[data-type="audio"] {
            background-color: #f3e6ff;
            color: #5b238b;
        }
        .file-badge[data-type="document"] {
            background-color: #e6f7f0;
            color: #186947;
        }
        .file-badge[data-type="other"] {
            background-color: #f0f0f0;
            color: #555;
        }
        .share-section {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: flex-end;
        }
        .share-toggle-button,
        .share-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .share-toggle-button {
            background-color: #1f2937;
            color: #fff;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.18);
        }
        .share-toggle-button:hover,
        .share-section.is-open .share-toggle-button {
            background-color: #0b63d1;
            transform: translateY(-1px);
        }
        .share-toggle-button svg {
            width: 21px;
            height: 21px;
        }
        .share-panel {
            position: fixed;
            z-index: 3000;
            min-width: 286px;
            padding: 10px;
            border: 1px solid #dde3ed;
            border-radius: 14px;
            background-color: #fff;
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.18);
        }
        .share-panel[hidden] {
            display: none;
        }
        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .share-button {
            background-color: #e6edf8;
            color: #1d3b70;
        }
        .share-button svg {
            width: 20px;
            height: 20px;
        }
        .share-toggle-button:focus-visible,
        .share-button:focus-visible {
            outline: 3px solid rgba(3, 102, 214, 0.45);
            outline-offset: 2px;
        }
        .share-button .share-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .share-button:hover {
            background-color: #d6e3f5;
            transform: translateY(-1px);
        }
        .share-button[data-network="facebook"] {
            background-color: #1877f2;
            color: #fff;
        }
        .share-button[data-network="facebook"]:hover {
            background-color: #0f5dc8;
        }
        .share-button[data-network="x"] {
            background-color: #111;
            color: #fff;
        }
        .share-button[data-network="x"]:hover {
            background-color: #333;
        }
        .share-button[data-network="linkedin"] {
            background-color: #0a66c2;
            color: #fff;
        }
        .share-button[data-network="linkedin"]:hover {
            background-color: #084f97;
        }
        .share-button[data-network="threads"] {
            background-color: #111;
            color: #fff;
        }
        .share-button[data-network="threads"]:hover {
            background-color: #333;
        }
        .share-button[data-network="kakao"] {
            background-color: #fee500;
            color: #371d1e;
        }
        .share-button[data-network="kakao"]:hover {
            background-color: #f2d900;
        }
        .share-button[data-network="email"] {
            background-color: #f97316;
            color: #fff;
        }
        .share-button[data-network="email"]:hover {
            background-color: #ea580c;
        }
        .share-button[data-network="native"],
        .share-button[data-network="copy"] {
            background-color: #efefef;
            color: #333;
        }
        .share-button[data-network="native"]:hover,
        .share-button[data-network="copy"]:hover {
            background-color: #e0e0e0;
        }
        .share-feedback {
            min-height: 18px;
            font-size: 0.85em;
            color: #1d3b70;
        }
        .share-feedback.share-feedback--error {
            color: #a11;
        }
        #content {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .markdown-viewer {
            width: 100%;
            min-height: 500px;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 24px;
            background: #fff;
            overflow: auto;
            font-size: 16px;
            line-height: 1.72;
        }
        .markdown-viewer h1,
        .markdown-viewer h2,
        .markdown-viewer h3 {
            margin: 1.2em 0 0.55em;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 0.25em;
        }
        .markdown-viewer h1:first-child,
        .markdown-viewer h2:first-child,
        .markdown-viewer h3:first-child {
            margin-top: 0;
        }
        .markdown-viewer p {
            margin: 0.7em 0;
        }
        .markdown-viewer ul,
        .markdown-viewer ol {
            margin: 0.7em 0;
            padding-left: 1.5em;
            list-style: revert;
        }
        .markdown-viewer pre {
            overflow: auto;
            padding: 12px;
            border-radius: 8px;
            background: #f5f7fa;
            border: 1px solid #e1e6ef;
        }
        .markdown-viewer code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            background: #f5f7fa;
            border-radius: 4px;
            padding: 0.1em 0.3em;
        }
        .markdown-viewer pre code {
            padding: 0;
            background: transparent;
        }
        .markdown-viewer blockquote {
            margin: 0.8em 0;
            padding-left: 1em;
            color: #59636e;
            border-left: 4px solid #d6deea;
        }
        .markdown-viewer img {
            max-width: 100%;
            height: auto;
        }
        .directory-browser {
            margin-top: 18px;
            border: 1px solid #dde3ed;
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .directory-browser-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid #e5e9f0;
            background: #f7f9fc;
            flex-shrink: 0;
        }
        .directory-browser-title {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .directory-browser-title strong {
            font-size: 0.95em;
            color: #1f2937;
        }
        .directory-browser-title span {
            font-size: 1.06em;
            font-weight: 700;
            color: #667085;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .directory-browser-meta,
        .directory-path-links {
            display: inline-flex;
            align-items: center;
            min-width: 0;
            max-width: 100%;
            gap: 4px;
            white-space: nowrap;
        }
        .directory-browser-meta {
            overflow: hidden;
        }
        .directory-path-links {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .directory-path-link {
            border: 0;
            padding: 0;
            background: transparent;
            color: #2f5d9a;
            cursor: pointer;
            font: inherit;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .directory-browser-title .directory-path-link {
            max-width: 360px;
            color: #17406f;
        }
        .directory-browser-title .directory-path-text,
        .directory-browser-title .directory-path-separator {
            color: #344054;
        }
        .directory-browser-title .directory-item-count {
            color: #475467;
            font-weight: 600;
        }
        .directory-path-link:hover,
        .directory-path-link:focus {
            text-decoration: underline;
            outline: none;
        }
        .directory-path-text,
        .directory-path-separator,
        .directory-item-count {
            color: #667085;
            flex-shrink: 0;
        }
        .directory-browser-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .view-mode-control {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            padding: 3px;
            border: 1px solid #ccd3df;
            border-radius: 999px;
            background: #eef2f7;
            flex-shrink: 0;
        }
        .view-mode-button {
            width: 34px;
            height: 30px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #4b5563;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .view-mode-button svg {
            width: 20px;
            height: 20px;
            display: block;
        }
        .view-mode-button[aria-pressed="true"] {
            background: #4b5563;
            color: #fff;
        }
        .preview-toggle-button {
            width: 34px;
            height: 30px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #4b5563;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .preview-toggle-button svg {
            width: 21px;
            height: 21px;
            display: block;
        }
        .preview-toggle-button[aria-pressed="true"] {
            background: #4b5563;
            color: #fff;
        }
        .directory-browser-layout {
            min-width: 0;
            flex: 1 1 auto;
            min-height: 0;
            overflow: hidden;
        }
        .directory-items {
            padding: 14px;
            min-height: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
        }
        .directory-item {
            color: #1f2937;
            text-decoration: none;
            border: 1px solid transparent;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            min-width: 0;
            font: inherit;
            text-align: left;
        }
        .directory-item:hover,
        .directory-item:focus {
            border-color: #b8c6dc;
            background: #f6f9ff;
            outline: none;
        }
        .directory-item-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: 700;
            font-size: 0.78em;
            color: #1f3c6d;
            background: #e8eef9;
        }
        .directory-folder-icon {
            background: transparent;
        }
        .directory-folder-icon svg {
            width: 44px;
            height: 34px;
        }
        .directory-image-thumb,
        .directory-video-thumb,
        .directory-inline-thumb,
        .directory-audio-thumb {
            position: relative;
            background: #f1f4f9;
            overflow: hidden;
        }
        .directory-image-thumb img,
        .directory-video-thumb video,
        .directory-inline-thumb iframe {
            width: 100%;
            height: 100%;
            display: block;
        }
        .directory-image-thumb img,
        .directory-video-thumb video {
            object-fit: cover;
        }
        .directory-inline-thumb {
            background: #fff;
        }
        .directory-inline-thumb iframe {
            border: 0;
            background: #fff;
            pointer-events: none;
        }
        .directory-inline-extension-chip {
            position: absolute;
            left: 4px;
            bottom: 4px;
            max-width: calc(100% - 8px);
            padding: 2px 4px;
            border-radius: 5px;
            background: rgba(15, 23, 42, 0.78);
            color: #fff;
            font-size: 9px;
            line-height: 1;
            font-weight: 800;
            letter-spacing: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .directory-audio-thumb {
            background: #f3e6ff;
        }
        .directory-audio-thumb > .file-badge {
            width: 100%;
            height: 100%;
            border-radius: inherit;
            font-size: 0.72em;
        }
        .directory-item-play-overlay svg {
            width: 22px;
            height: 22px;
            filter: drop-shadow(0 4px 10px rgba(15, 23, 42, 0.28));
        }
        .directory-item[data-kind="directory"] .directory-item-icon {
            color: #064f7a;
        }
        .directory-item-main {
            min-width: 0;
        }
        .directory-item-name {
            display: block;
            font-weight: 600;
            word-break: break-word;
        }
        .directory-item-meta {
            display: block;
            margin-top: 4px;
            color: #667085;
            font-size: 0.82em;
        }
        .directory-browser[data-view-mode="grid"] .directory-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 14px;
        }
        .directory-browser[data-view-mode="grid"] .directory-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 14px 10px;
            text-align: center;
        }
        .directory-browser[data-view-mode="grid"] .directory-item-icon {
            width: 82px;
            height: 82px;

    <script>
        function navigateWithSearch(event, target) {
            event.preventDefault();
            const searchInput = document.getElementById('searchInput');
            const titleOnly = document.getElementById('titleOnlyCheckbox');
            const filterTypes = ['image', 'video', 'audio', 'document'];

            const params = new URLSearchParams();
            if (searchInput && searchInput.value.trim()) {
                params.set('search', searchInput.value.trim());
            }

            if (titleOnly) {
                params.set('titleOnly', titleOnly.checked ? '1' : '0');
            }

            filterTypes.forEach(type => {
                const filterCheckbox = document.getElementById(`${type}Filter`);
                if (filterCheckbox) {
                    params.set(type, filterCheckbox.checked ? '1' : '0');

                    if (filterCheckbox.checked) {
                        const extensionContainer = document.getElementById(`${type}Extensions`);
                        if (extensionContainer) {
                            const checkedExtensions = Array.from(extensionContainer.querySelectorAll('input[type="checkbox"]:checked'))
                                .map(input => input.value);
                            if (checkedExtensions.length > 0) {
                                params.set(`${type}_ext`, checkedExtensions.join(','));
                            }
                        }
                    }
                }
            });

            const query = params.toString();
            const url = query ? `${target}?${query}` : target;
            window.location.href = url;
        }
    </script>
